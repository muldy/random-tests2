name: Lint test and Build Project
on: push

jobs:
    runs-on: ubuntu-latest
    steps:
        - name: Get the code
          uses: actions/checkout@v7
        - name: Install NodeJS
          uses: actions/setup-node@v6
          with:
            node-version: 18
        - name: Install dependencies
          run: npm ci
        - name: Run tests
          run: npm test
