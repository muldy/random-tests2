name: Lint test and Build Project
on: push

jobs:
    lint:
      runs-on: ubuntu-latest
      steps:
          - name: Get the code
            uses: actions/checkout@v7
          - name: Install NodeJS
            uses: actions/setup-node@v6
            with:
              node-version: 18
          - name: Install dependencies
            run: npm ci
          - name: Lint code
            run: npm lint
    test:
      runs-on: ubuntu-latest
      steps:
          - name: Get the code
            uses: actions/checkout@v7
          - name: Install NodeJS
            uses: actions/setup-node@v6
            with:
              node-version: 18
          - name: Install dependencies
            run: npm ci
          - name: Run tests
            run: npm test
    build:
      runs-on: ubuntu-latest
      needs: [lint, test]
      steps:
          - name: Get the code
            uses: actions/checkout@v7
          - name: Install NodeJS
            uses: actions/setup-node@v6
            with:
              node-version: 18
          - name: Install dependencies
            run: npm ci
          - name: build
            run: npm build
          - name: deploy
            run: echo deploying...